<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome | BudgetNest</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to right, #fce4ec, #e3f2fd);
    }

    .welcome-box {
      text-align: center;
      background: #fff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
      max-width: 500px;
    }

    h1 {
      color: #007bff;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      color: #333;
    }

    button {
      margin-top: 30px;
      padding: 10px 20px;
      font-size: 16px;
      background-color: #dc3545;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>
  <div class="welcome-box">
    <h1>Welcome</h1>
    <p id="userGreeting">Hi, user!</p>
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    const username = sessionStorage.getItem('username') || 'User';
    document.getElementById('userGreeting').innerText = `Hi, ${username}!`;

    function logout() {
      sessionStorage.clear();
      window.location.href = 'login.html';
    }
  </script>
</body>
</html>
